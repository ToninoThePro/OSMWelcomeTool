name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set-runner.outputs.runner }}
    steps:
      - name: Check for self-hosted runners
        id: set-runner
        run: |
          echo "Checking for available self-hosted runners..."
          # Try to get runners, but fallback gracefully if permissions are denied (HTTP 403) or no runners found
          if RUNNERS=$(gh api -H "Accept: application/vnd.github+json" /repos/${{ github.repository }}/actions/runners --jq '.runners[] | select(.status == "online" and (.labels[] | .name == "self-hosted")) | .name' 2>/dev/null); then
            if [ -n "$RUNNERS" ]; then
              echo "Found online self-hosted runner(s): $RUNNERS"
              echo "runner=[\"self-hosted\", \"linux\"]" >> "$GITHUB_OUTPUT"
            else
              echo "No online self-hosted runners found. Falling back to ubuntu-latest."
              echo "runner=\"ubuntu-latest\"" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Warning: Could not check for self-hosted runners (likely permission denied). Falling back to ubuntu-latest."
            echo "runner=\"ubuntu-latest\"" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check-runner
    runs-on: ${{ fromJson(needs.check-runner.outputs.runner) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
